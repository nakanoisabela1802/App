name: Pipelina CI/CD

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  job1:
    name: build_ecr
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: arn:aws:iam::897074276729:role/GitHubActionsRepoApp
          aws-region: us-east-2

      - name: HashiCorp - Setup Terraform
        uses: hashicorp/setup-terraform@v3.1.2

      - name: Amazon ECR Login
        uses: aws-actions/amazon-ecr-login@v2.0.2

      - name: Build, tag e push
        run: |
          docker build -t meu-website:v1.0 .
          docker tag meu-website:v1.0 897074276729.dkr.ecr.us-east-2.amazonaws.com/ecr-site-prod:v1.0
          docker push 897074276729.dkr.ecr.us-east-2.amazonaws.com/ecr-site-prod:v1.0